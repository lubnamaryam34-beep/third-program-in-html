<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body bgcolor="skyblue">
    <h1>Student Online Registration Form</h1>
    <form>
     
            Name :
            <input type="text" placeholder="enter your name">
        
        <br><br>
    
            F/Name : 
            <input type="text" placeholder="enter your f/name">
    
        <br><br>
    
            Email : 
            <input type="text" placeholder="enter your email">
    
        <br><br>
            
            Phone No :
            <input type="nomber" placeholder="enter your phone no">

            <br><br>
    
            Address :
            <input type="text" placeholder="enter your address">
    
        <br><br>
    
            Gender :
            <input type="radio">Male 
            <input type="radio" >Female 
             <input type="radio">Other
    
        <br><br>
    
            Select  One : 
            <input type="checkbox">Married 
             <input type="checkbox">Un married
        
        <br><br>
    
            Select Course : 
            <select>
            <option value="Web">Web Development</option>
            <option value="Graphic">Graphic Designing</option>
            <option value="Digital">Degital Marketing</option>
            <option value="Video">Video Editing</option>
            <option value="App">App Development</option>
            <option value="Artificial">Artificial INtelligence(AI)</option>
            <option value="Data">Data Science</option>
            <option value="Cyber">Cyber Security</option>
            <option value="Freelancing">Freelancing</option>
            <option value="Wordpress">Wordpress Development</option>
            <option value="Ms Office">Ms Office/ Computer Operator</option>
            </select>
    
        <br><br>

        Date :
        <input type="Date">

        <br><br>

        Time : 
        <input type="time">
        
        <br><br>

        <input type="button" value="submit">
        <input type="button" value="Reset">
     
    </form>
</body>
</html>
